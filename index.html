<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>RenMap — Arizona Renaissance Festival 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Crimson+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --parchment: #f5ead0;
  --parchment-dark: #e8d5aa;
  --ink: #2c1810;
  --ink-light: #5a3d2b;
  --gold: #c9952b;
  --gold-light: #e8c66a;
  --gold-dim: rgba(201,149,43,0.15);
  --crimson: #8b1a2b;
  --crimson-light: #c4364d;
  --forest: #2d5a27;
  --royal-blue: #1e3a5f;
  --grid-line: rgba(44,24,16,0.08);
  --grid-line-hour: rgba(44,24,16,0.18);
  --shadow: 0 2px 12px rgba(44,24,16,0.12);
  --shadow-lg: 0 4px 24px rgba(44,24,16,0.18);
  --radius: 6px;
  --cell-height: 20px;
  --col-width: 150px;
  --time-col: 52px;
  --header-height: 36px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Crimson Pro', Georgia, serif;
  background: var(--parchment);
  color: var(--ink);
  min-height:100vh;
  min-height:100dvh;
  overflow-x:hidden;
}

/* ── HEADER ── */
.app-header {
  background: var(--ink);
  color: var(--parchment);
  padding: 14px 16px 12px;
  position:sticky; top:0; z-index:100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.app-header h1 {
  font-family: 'Uncial Antiqua', cursive;
  font-size: 22px;
  font-weight:400;
  letter-spacing: 1px;
  display:flex; align-items:center; gap:8px;
}
.app-header h1 .crown { font-size:20px; }
.app-header .subtitle {
  font-size: 11px;
  opacity:0.6;
  margin-top:2px;
  font-weight:300;
  letter-spacing:0.5px;
  text-transform:uppercase;
}

/* ── MAP SECTION ── */
.map-section { position:relative; }
.map-toggle {
  display:flex; align-items:center; justify-content:space-between;
  padding: 10px 16px;
  background: var(--parchment-dark);
  border-bottom:1px solid rgba(44,24,16,0.1);
  cursor:pointer;
  user-select:none;
  font-weight:600;
  font-size:14px;
}
.map-toggle .chevron {
  transition: transform 0.3s;
  font-size:12px;
}
.map-toggle.open .chevron { transform: rotate(180deg); }
.map-container {
  overflow:auto;
  max-height:0;
  transition: max-height 0.4s ease;
  background:#e0d0aa;
  -webkit-overflow-scrolling: touch;
}
.map-container.open {
  max-height:600px;
}
.map-container img {
  display:block;
  width:max(100%, 900px);
  height:auto;
}

/* ── CONTROLS ── */
.controls {
  padding: 10px 12px;
  background: var(--parchment);
  border-bottom: 1px solid rgba(44,24,16,0.12);
  position:sticky;
  top:54px;
  z-index:90;
}
.control-row {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}
.control-row:last-child { margin-bottom:0; }
.control-label {
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.8px;
  font-weight:600;
  color: var(--ink-light);
  white-space:nowrap;
  min-width:48px;
}

/* Venue filter toggle button */
.btn-venue-toggle {
  padding: 5px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  border:1.5px solid var(--ink);
  background: transparent;
  color: var(--ink);
  transition: all 0.15s;
  white-space:nowrap;
  font-family:inherit;
  display:flex;
  align-items:center;
  gap:5px;
}
.btn-venue-toggle .arrow {
  font-size:8px;
  transition: transform 0.2s;
}
.btn-venue-toggle.open .arrow {
  transform: rotate(180deg);
}

/* Venue chips dropdown panel */
.venue-panel {
  max-height:0;
  overflow:hidden;
  transition: max-height 0.25s ease, padding 0.25s ease;
  padding: 0 0;
}
.venue-panel.open {
  max-height:300px;
  padding: 8px 0 4px;
}
.venue-chips {
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.chip {
  padding: 5px 11px;
  border-radius: 20px;
  font-size: 11px;
  font-weight:500;
  white-space:nowrap;
  cursor:pointer;
  border: 1.5px solid var(--ink);
  background:transparent;
  color:var(--ink);
  transition: all 0.15s;
  user-select:none;
}
.chip.active {
  background: var(--ink);
  color: var(--parchment);
}
.chip:active { transform:scale(0.95); }

.btn-fav-filter {
  padding: 5px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  border:1.5px solid var(--crimson);
  background: transparent;
  color: var(--crimson);
  transition: all 0.15s;
  white-space:nowrap;
  font-family:inherit;
}
.btn-fav-filter.active {
  background:var(--crimson);
  color: white;
}
.btn-all {
  padding: 4px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  border:1.5px solid var(--gold);
  background: var(--gold);
  color: var(--ink);
  font-family:inherit;
  flex-shrink:0;
}

/* ── SCHEDULE GRID ── */
.schedule-wrap {
  position:relative;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
  /* Account for header(~54px) + controls(~80px) */
}
.schedule-grid {
  display:grid;
  position:relative;
  min-width: fit-content;
}
.time-header {
  position:sticky;
  left:0;
  top:0;
  z-index:20;
  background: var(--ink);
  color: var(--gold-light);
  font-size:9px;
  font-family:'JetBrains Mono', monospace;
  font-weight:500;
  display:flex;
  align-items:center;
  justify-content:center;
  height: var(--header-height);
  min-width: var(--time-col);
  border-bottom:2px solid var(--gold);
}
.venue-header {
  position:sticky;
  top:0;
  z-index:15;
  background: var(--ink);
  color: var(--parchment);
  font-size:10px;
  font-weight:600;
  text-align:center;
  padding:4px 6px;
  height: var(--header-height);
  min-width: var(--col-width);
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:2px solid var(--gold);
  border-left:1px solid rgba(255,255,255,0.08);
  letter-spacing:0.3px;
  line-height:1.1;
}
.time-cell {
  position:sticky;
  left:0;
  z-index:10;
  background: var(--parchment-dark);
  font-family:'JetBrains Mono', monospace;
  font-size:9px;
  font-weight:500;
  color: var(--ink-light);
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding-top:2px;
  min-width: var(--time-col);
  height: var(--cell-height);
  border-bottom:1px solid var(--grid-line);
  border-right:1px solid var(--grid-line-hour);
}
.time-cell.hour {
  border-bottom:1px solid var(--grid-line-hour);
  color:var(--ink);
  font-weight:700;
  font-size:10px;
}
.grid-cell {
  min-width: var(--col-width);
  height: var(--cell-height);
  border-bottom:1px solid var(--grid-line);
  border-left:1px solid var(--grid-line);
  position:relative;
}
.grid-cell.hour-mark {
  border-bottom:1px solid var(--grid-line-hour);
}

/* ── EVENT BLOCKS ── */
.event-block {
  position:absolute;
  left:3px; right:3px;
  border-radius:var(--radius);
  padding:4px 6px;
  font-size:10px;
  line-height:1.2;
  cursor:pointer;
  overflow:hidden;
  z-index:5;
  transition: box-shadow 0.15s, transform 0.15s;
  border-left:3px solid rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
  gap:1px;
}
.event-block:active { transform:scale(0.97); }
.event-block .event-name {
  font-weight:700;
  font-size:10px;
  line-height:1.15;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.event-block .event-sub {
  font-size:8.5px;
  opacity:0.8;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.event-block .event-time {
  font-family:'JetBrains Mono',monospace;
  font-size:8px;
  opacity:0.7;
}
.event-block .fav-star {
  position:absolute;
  top:2px; right:3px;
  font-size:12px;
  opacity:0.4;
  transition:opacity 0.15s;
}
.event-block.favorited .fav-star {
  opacity:1;
}
.event-block .lc-badge {
  font-size:7px;
  font-weight:700;
  background:rgba(0,0,0,0.2);
  padding:1px 3px;
  border-radius:3px;
  position:absolute;
  bottom:2px; right:3px;
}

/* Venue colors */
.ev-royal-pavilion { background:#7b2d8e; color:white; border-left-color:#5a1068; }
.ev-boat-house { background:#1565a0; color:white; border-left-color:#0d4470; }
.ev-fairhaven { background:#c9952b; color:var(--ink); border-left-color:#a07520; }
.ev-mud-stage { background:#6d4c2a; color:white; border-left-color:#4a3218; }
.ev-philage { background:#b84c65; color:white; border-left-color:#8e2d48; }
.ev-middleshire { background:#2d8a4e; color:white; border-left-color:#1a6635; }
.ev-mynstrels { background:#4a7c59; color:white; border-left-color:#365d42; }
.ev-melee { background:#8b4513; color:white; border-left-color:#6b3410; }
.ev-falconers { background:#d4853b; color:var(--ink); border-left-color:#b06825; }
.ev-monks { background:#3a7ca5; color:white; border-left-color:#2a5d80; }
.ev-carnevale { background:#d63384; color:white; border-left-color:#a82268; }
.ev-dancing-pig { background:#e8553d; color:white; border-left-color:#c43a25; }
.ev-teatro { background:#6c5ce7; color:white; border-left-color:#4e3fc0; }
.ev-rialto { background:#00897b; color:white; border-left-color:#00695c; }
.ev-pans-oasis { background:#0277bd; color:white; border-left-color:#015a91; }
.ev-jousting { background:#8b1a2b; color:white; border-left-color:#6a1020; }
.ev-other { background:#546e7a; color:white; border-left-color:#37474f; }

/* ── NOW LINE ── */
.now-line {
  position:absolute;
  left:0; right:0;
  height:2px;
  background:var(--crimson-light);
  z-index:8;
  pointer-events:none;
}
.now-line::before {
  content:'NOW';
  position:absolute;
  left:2px;
  top:-8px;
  font-size:7px;
  font-weight:700;
  color:var(--crimson-light);
  font-family:'JetBrains Mono',monospace;
}

/* ── EVENT DETAIL MODAL ── */
.modal-overlay {
  position:fixed;
  inset:0;
  background:rgba(44,24,16,0.5);
  z-index:200;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.2s;
}
.modal-overlay.open {
  opacity:1;
  pointer-events:all;
}
.modal {
  background:var(--parchment);
  border-radius:16px 16px 0 0;
  width:100%;
  max-width:420px;
  padding:20px 20px 32px;
  transform:translateY(100%);
  transition: transform 0.3s ease;
  max-height:60vh;
  overflow-y:auto;
}
.modal-overlay.open .modal { transform:translateY(0); }
.modal-handle {
  width:36px; height:4px;
  background:rgba(44,24,16,0.2);
  border-radius:2px;
  margin:0 auto 16px;
}
.modal h2 {
  font-family:'Uncial Antiqua',cursive;
  font-size:18px;
  margin-bottom:4px;
}
.modal .modal-sub {
  font-size:13px;
  color:var(--ink-light);
  margin-bottom:12px;
}
.modal .modal-venue {
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.8px;
  font-weight:600;
  margin-bottom:8px;
}
.modal .modal-times {
  display:flex; flex-wrap:wrap; gap:6px;
  margin-bottom:16px;
}
.modal .modal-times span.modal-time {
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  padding:6px 12px;
  background:var(--parchment-dark);
  border-radius:12px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:5px;
  border:1.5px solid transparent;
  transition:all 0.15s;
  user-select:none;
}
.modal .modal-times span.modal-time.selected {
  border-color:var(--ink);
}
.modal .modal-times span.modal-time.fav {
  background:var(--crimson);
  color:white;
}
.modal .modal-times span.modal-time.fav .modal-time-star {
  color:white;
}
.modal .modal-times .modal-time-star {
  color:var(--crimson);
  font-size:13px;
}
.modal .modal-times span.modal-time:active {
  transform:scale(0.95);
}
.modal .modal-help {
  font-size:11px;
  color:var(--ink-light);
  text-align:center;
  margin-top:4px;
}
.btn-lc-filter {
  padding: 5px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  border:1.5px solid var(--gold);
  background: transparent;
  color: var(--gold);
  transition: all 0.15s;
  white-space:nowrap;
  font-family:inherit;
}
.btn-lc-filter.active {
  background:var(--gold);
  color: var(--ink);
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align:center;
  padding:60px 20px;
  color:var(--ink-light);
}
.empty-state .icon { font-size:40px; margin-bottom:12px; }
.empty-state p { font-size:14px; }

/* ── SCROLLBAR ── */
.schedule-wrap::-webkit-scrollbar { height:6px; width:6px; }
.schedule-wrap::-webkit-scrollbar-track { background:var(--parchment-dark); }
.schedule-wrap::-webkit-scrollbar-thumb { background:rgba(44,24,16,0.2); border-radius:3px; }

@media(min-width:768px) {
  :root {
    --col-width: 170px;
    --cell-height: 22px;
    --time-col: 60px;
  }
  .event-block .event-name { font-size:11px; }
}
</style>
</head>

  {id:"po1",venue:"pans-oasis",name:"Knotty Nauticals",sub:"Pirates on Fire (LC)",times:["11:15","12:45","14:15"],dur:25,lc:true},
  {id:"po2",venue:"pans-oasis",name:"Knotty Nauticals",sub:"The Naughty Show",times:["15:45"],dur:25},
  {id:"po3",venue:"pans-oasis",name:"Washing Well Wenches",sub:"(LC)",times:["12:00","13:30","15:00","16:30"],dur:25,lc:true},

  // OTHER
  {id:"ot1",venue:"other",name:"The Green Man",sub:"By the Royal Pavilion",times:["11:00","12:00","14:00","15:00"],dur:25},
  {id:"ot2",venue:"other",name:"Glassblowing Demos",sub:"Near Teatro de la Rosa",times:["11:00","12:30","14:30","16:00"],dur:25},
  {id:"ot3",venue:"other",name:"Town Dance",sub:"Local Yokels Village",times:["15:30"],dur:25},
  {id:"ot4",venue:"other",name:"Drum Jam",sub:"Fairhaven Theatre",times:["17:45"],dur:30},
  {id:"ot5",venue:"other",name:"Closing Gate Faire-Thee-Well",sub:"Front Gate",times:["17:45"],dur:15},
  {id:"ot6",venue:"other",name:"The Hops! Pub Crawl",sub:"Feast Hall Tower · 21+",times:["14:00"],dur:60},
];

// ── STATE ──
let activeVenues = new Set(VENUES.map(v => v.id));
let favorites = new Set(JSON.parse(localStorage.getItem('renmap_favs') || '[]'));
let favFilterOn = false;
let selectedEvent = null;

// Time grid: 10:00 to 18:15 in 15-min steps
const START_HOUR = 10;
const END_HOUR = 18;
const STEP = 15; // minutes
const SLOTS = [];
for(let h=START_HOUR; h<=END_HOUR; h++) {
  for(let m=0; m<60; m+=STEP) {
    if(h===END_HOUR && m > 15) break;
    SLOTS.push({ h, m, label: formatTime(h,m) });
  }
}

function formatTime(h,m) {
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hr = h > 12 ? h-12 : h;
  return m === 0 ? `${hr}${ampm}` : `${hr}:${String(m).padStart(2,'0')}`;
}

function parseTime(s) {
  const [hh,mm] = s.split(':').map(Number);
  return { h:hh, m:mm };
}

function timeToSlot(h,m) {
  return ((h - START_HOUR) * 60 + m) / STEP;
}

function saveFavs() {
  localStorage.setItem('renmap_favs', JSON.stringify([...favorites]));
}

// ── MAP TOGGLE ──
function toggleMap() {
  const btn = document.getElementById('mapToggle');
  const container = document.getElementById('mapContainer');
  btn.classList.toggle('open');
  container.classList.toggle('open');
}

// ── VENUE CHIPS ──
function updateVenueLabel() {
  const label = document.getElementById('venueToggleLabel');
  const count = activeVenues.size;
  if(count === VENUES.length) label.textContent = 'Venues (All)';
  else if(count === 0) label.textContent = 'Venues (None)';
  else label.textContent = `Venues (${count}/${VENUES.length})`;
}

function toggleVenuePanel() {
  const panel = document.getElementById('venuePanel');
  const btn = document.getElementById('venueToggleBtn');
  panel.classList.toggle('open');
  btn.classList.toggle('open');
}

function renderChips() {
  const wrap = document.getElementById('venueChips');
  wrap.innerHTML = VENUES.map(v => `
    <div class="chip ${activeVenues.has(v.id)?'active':''}" data-venue="${v.id}" onclick="toggleVenue('${v.id}')">
      ${v.short}
    </div>
  `).join('');
  updateVenueLabel();
}

function toggleVenue(id) {
  if(activeVenues.has(id)) activeVenues.delete(id);
  else activeVenues.add(id);
  renderChips();
  renderGrid();
}

function toggleAllVenues() {
  if(activeVenues.size === VENUES.length) {
    activeVenues.clear();
  } else {
    VENUES.forEach(v => activeVenues.add(v.id));
  }
  renderChips();
  renderGrid();
}

function toggleFavFilter() {
  favFilterOn = !favFilterOn;
  document.getElementById('favFilterBtn').classList.toggle('active', favFilterOn);
  renderGrid();
}

let lcFilterOn = false;
function toggleLcFilter() {
  lcFilterOn = !lcFilterOn;
  document.getElementById('lcFilterBtn').classList.toggle('active', lcFilterOn);
  renderGrid();
}

// ── GRID RENDER ──
function renderGrid() {
  const grid = document.getElementById('scheduleGrid');
  const visibleVenues = VENUES.filter(v => activeVenues.has(v.id));

  if(visibleVenues.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">&#x1F3AD;</div><p>Select venues above to see the schedule</p></div>';
    grid.style.display = 'block';
    return;
  }

  const cols = visibleVenues.length + 1; // +1 for time col
  grid.style.display = 'grid';
  grid.style.gridTemplateColumns = `var(--time-col) repeat(${visibleVenues.length}, var(--col-width))`;
  grid.style.gridTemplateRows = `var(--header-height) repeat(${SLOTS.length}, var(--cell-height))`;

  let html = '';

  // Header row
  html += `<div class="time-header">TIME</div>`;
  visibleVenues.forEach(v => {
    html += `<div class="venue-header">${v.short}</div>`;
  });

  // Time rows + grid cells
  SLOTS.forEach((slot, ri) => {
    const isHour = slot.m === 0;
    const showLabel = slot.m === 0 || slot.m === 30;
    html += `<div class="time-cell ${isHour?'hour':''}" style="grid-row:${ri+2};grid-column:1">${showLabel ? slot.label : ''}</div>`;
    visibleVenues.forEach((v, ci) => {
      html += `<div class="grid-cell ${isHour?'hour-mark':''}" style="grid-row:${ri+2};grid-column:${ci+2}" data-venue="${v.id}" data-slot="${ri}"></div>`;
    });
  });

  grid.innerHTML = html;

  // Place event blocks
  const visibleVenueIds = visibleVenues.map(v => v.id);

  EVENTS.forEach(ev => {
    if(!activeVenues.has(ev.venue)) return;
    if(lcFilterOn && !ev.lc) return;
    const colIdx = visibleVenueIds.indexOf(ev.venue);
    if(colIdx < 0) return;

    ev.times.forEach(timeStr => {
      const t = parseTime(timeStr);
      const slotStart = timeToSlot(t.h, t.m);
      const slotSpan = (ev.dur || 25) / STEP;

      const favKey = ev.id + '_' + timeStr;
      if(favFilterOn && !favorites.has(favKey)) return;

      const top = slotStart * parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-height'));
      const height = slotSpan * parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-height'));
      const isFav = favorites.has(favKey);

      const block = document.createElement('div');
      block.className = `event-block ev-${ev.venue} ${isFav?'favorited':''}`;
      block.style.cssText = `grid-row:${Math.floor(slotStart)+2} / span ${Math.ceil(slotSpan)}; grid-column:${colIdx+2};`;
      block.style.position = 'relative';
      block.style.height = 'auto';
      block.style.minHeight = '100%';
      block.innerHTML = `
        <span class="event-name">${ev.name}</span>
        ${ev.sub ? `<span class="event-sub">${ev.sub}</span>` : ''}
        <span class="fav-star">${isFav ? '&#x2605;' : '&#x2606;'}</span>
        ${ev.lc ? '<span class="lc-badge">LC</span>' : ''}
      `;
      block.onclick = () => openModal(ev, timeStr);

      // Find the grid cell to position relative to
      const cell = grid.querySelector(`.grid-cell[data-venue="${ev.venue}"][data-slot="${Math.floor(slotStart)}"]`);
      if(cell) {
        cell.style.position = 'relative';
        block.style.position = 'absolute';
        block.style.top = `${(slotStart % 1) * parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-height'))}px`;
        block.style.left = '2px';
        block.style.right = '2px';
        block.style.height = `${slotSpan * parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-height')) - 2}px`;
        block.style.minHeight = 'auto';
        block.style.zIndex = 5;
        cell.appendChild(block);
      }
    });
  });
}

// ── MODAL ──
let selectedTime = null;

function openModal(ev, timeStr) {
  selectedEvent = ev;
  selectedTime = timeStr || null;
  document.getElementById('modalVenue').textContent = VENUES.find(v=>v.id===ev.venue)?.name || '';
  document.getElementById('modalTitle').textContent = ev.name;
  document.getElementById('modalSub').textContent = ev.sub || '';
  document.getElementById('modalTimes').innerHTML = ev.times.map(t => {
    const p = parseTime(t);
    const favKey = ev.id + '_' + t;
    const isFav = favorites.has(favKey);
    const isSelected = t === selectedTime;
    return `<span class="modal-time${isSelected?' selected':''}${isFav?' fav':''}" onclick="toggleTimeFav('${ev.id}','${t}',event)">
      <span class="modal-time-label">${formatTime(p.h,p.m)}</span>
      <span class="modal-time-star">${isFav ? '&#x2605;' : '&#x2606;'}</span>
    </span>`;
  }).join('');
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if(e.target.id === 'modalOverlay') {
    document.getElementById('modalOverlay').classList.remove('open');
    selectedEvent = null;
    selectedTime = null;
  }
}

function toggleTimeFav(evId, timeStr, e) {
  e.stopPropagation();
  selectedTime = timeStr;
  const favKey = evId + '_' + timeStr;
  if(favorites.has(favKey)) favorites.delete(favKey);
  else favorites.add(favKey);
  saveFavs();
  // Re-open modal to refresh time stars and selection
  if(selectedEvent) openModal(selectedEvent, timeStr);
  renderGrid();
}

// ── INIT ──
renderChips();
renderGrid();
</script>
</body>
</html>
